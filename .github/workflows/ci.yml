name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  deny:
    name: Cargo Deny Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cargo Deny Check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
          target: wasm32-unknown-unknown
      - name: Run clippy
        run: cargo clippy --target wasm32-unknown-unknown --release -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      # Workaround: ed25519-dalek 3.x breaks soroban-env-host testutils
      # (rand_core bump reshuffles CryptoRng). Cargo.lock is gitignored so
      # the resolver keeps drifting to the broken 3.x. Pin both ambiguous
      # lockfile entries to 2.2.0 to satisfy soroban-sdk's `^2.1.1` while
      # predating the 3.x trait reshuffle.
      - name: Pin ed25519-dalek to 2.2.0
        run: |
          cargo update -p ed25519-dalek@2.2.0 --precise 2.2.0
          cargo update -p ed25519-dalek@3.0.0 --precise 2.2.0
      - name: Run tests
        run: cargo test

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: wasm32-unknown-unknown
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

  doc:
    name: Generate API Documentation (rustdoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Build rustdoc
        # Mirrors `make doc`. Generates the HTML tree under
        # `target/doc/stellar_tip/index.html`, which is the line-by-line
        # source of truth for `docs/API_REFERENCE.md`. `--no-deps` keeps
        # CI logs (and rustdoc failures) scoped to this crate.
        # `RUSTDOCFLAGS="-D rustdoc::broken_intra_doc_links"` promotes any
        # unresolved intra-doc link to a hard error, ensuring all cross-
        # references in rustdoc comments (including TipError variant docs)
        # stay valid as the codebase evolves.
        env:
          RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links"
        run: cargo doc --no-deps
      - name: Upload rustdoc artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustdoc-html
          path: target/doc

  scout:
    name: Static Analysis (Scout)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      repository-projects: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Scout security analysis
        uses: coinfabrik/scout-actions@v3
        with:
          working_directory: "."
          fail_on_error: true
          verbose: false
      - name: Upload Scout report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scout-report
          path: report.md
