name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
          target: wasm32-unknown-unknown
      - name: Run clippy
        run: cargo clippy --target wasm32-unknown-unknown --release -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      # Workaround: ed25519-dalek 3.x breaks soroban-env-host testutils
      # (rand_core bump reshuffles CryptoRng). Cargo.lock is gitignored so
      # the resolver keeps drifting to the broken 3.x. Pin both ambiguous
      # lockfile entries to 2.2.0 to satisfy soroban-sdk's `^2.1.1` while
      # predating the 3.x trait reshuffle.
      - name: Pin ed25519-dalek to 2.2.0
        run: |
          cargo update -p ed25519-dalek@2.2.0 --precise 2.2.0
          cargo update -p ed25519-dalek@3.0.0 --precise 2.2.0
      - name: Run tests
        run: cargo test

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: wasm32-unknown-unknown
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

  scout:
    name: Static Analysis (Scout)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      repository-projects: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Scout security analysis
        uses: coinfabrik/scout-actions@v3
        with:
          working_directory: "."
          fail_on_error: true
          verbose: false
      - name: Upload Scout report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scout-report
          path: report.md
