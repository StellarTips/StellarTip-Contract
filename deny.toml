[advisories]
version = 2
db-url = "https://github.com/rustsec/advisory-db"
db-path = "~/.cargo/advisory-db"
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
yanked = "deny"
notice = "warn"

[licenses]
version = 2
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
version = 2
multiple-versions = "warn"
wildcards = "deny"
